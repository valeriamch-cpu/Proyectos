<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seguimiento de Procesos de Equipo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="login-view" class="card login-card">
        <h1>Seguimiento de procesos</h1>
        <p>Ingresa con tu usuario para ver tus pendientes y los de tu equipo.</p>

        <form id="login-form" class="form-grid">
          <label for="username">Usuario</label>
          <input id="username" name="username" placeholder="Ej: maria" required />

          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            required
          />

          <button type="submit">Ingresar</button>
          <p id="login-error" class="error" role="alert"></p>
        </form>
      </section>

      <section id="dashboard-view" class="hidden">
        <header class="topbar card">
          <div>
            <h2 id="welcome-title"></h2>
            <p class="muted">Calendario, pendientes y chat por proceso.</p>
          </div>
          <button id="logout-btn" class="secondary">Salir</button>
        </header>

        <section class="card legend">
          <h3>Calendario de fechas importantes</h3>
          <div class="legend-items">
            <span><i class="dot me"></i> Mis fechas</span>
            <span><i class="dot team"></i> Fechas del equipo</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section class="layout-grid">
          <article class="card">
            <h3>Pendientes autorizados del equipo</h3>
            <ul id="team-list" class="person-list"></ul>
          </article>

          <article class="card">
            <h3 id="selected-person-title">Selecciona una persona</h3>
            <ul id="task-list" class="task-list"></ul>
          </article>

          <article class="card chat-card">
            <h3>Chat interno del proceso</h3>
            <div id="chat-thread" class="chat-thread"></div>
            <form id="chat-form" class="chat-form">
              <input
                id="chat-input"
                name="chat"
                placeholder="Escribe un mensaje sobre este proceso"
                required
              />
              <button type="submit">Enviar</button>
            </form>
          </article>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
