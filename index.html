<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Notification Container -->
    <div id="notification-container" style="background-color: #f8d7da; padding: 10px; margin-bottom: 20px;">
        <span id="notification-message">Notifications will appear here.</span>
    </div>

    <!-- Button to Open Modal Form -->
    <button id="open-modal" onclick="openModal()">Add New Process</button>

    <!-- Modal Form -->
    <div id="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <form id="process-form">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required><br>
                <label for="dueDate">Due Date:</label>
                <input type="date" id="dueDate" name="dueDate" required><br>
                <label for="status">Status:</label>
                <select id="status" name="status" required>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                    <option value="in-progress">In Progress</option>
                </select><br>
                <label for="scope">Scope:</label>
                <select id="scope" name="scope" required>
                    <option value="me">Me</option>
                    <option value="team">Team</option>
                </select><br>
                <label for="owner">Owner:</label>
                <input type="text" id="owner" name="owner" required><br>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
